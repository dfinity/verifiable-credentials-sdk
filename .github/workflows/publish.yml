name: Publish Release

on:
  workflow_dispatch:
  release:
    types: [released]

run-name: >-
  ${{
    github.event_name == 'release' && 'Publish Release'
    || github.event_name == 'workflow_dispatch' && 'Next Publication'
    || 'Publish Release' }}

jobs:
  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      working-directory: js-library
      dist-directory: js-library/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare and Build JS Library
        uses: ./.github/actions/prepare
        with:
          folder: ${{env.working-directory}}

      - name: Publish
        working-directory: ${{env.dist-directory}}
        run: ../scripts/publish-npm.sh

  publish-next:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      working-directory: js-library
      dist-directory: js-library/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare and Build JS Library
        uses: ./.github/actions/prepare
        with:
          folder: ${{env.working-directory}}

      - name: Package next
        working-directory: ${{env.working-directory}}
        run: ./scripts/package-next

      - name: Publish
        working-directory: ${{env.dist-directory}}
        run: npm publish --provenance --tag next

  publish-rust:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      # Required for OIDC token exchange
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - name: Crates.io authentication
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth

      - name: Publish to crates.io
        working-directory: rust-packages/ic-verifiable-credentials
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
