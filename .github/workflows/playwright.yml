name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache
        with:
          path: |
            ~/.cargo
            target
          key: cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: cargo-
      - name: Install dependencies
        working-directory: dummy-e2e
        run: npm ci
      - name: Install ic-wasm
        run: cargo install ic-wasm --version 0.9.10
      - name: Install Playwright Browsers
        working-directory: dummy-e2e
        run: npx playwright install --with-deps
      - name: Install dfx
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365 # main
      - name: Start local replica
        run: dfx start --background
      - name: Deploy canisters
        run: dfx deploy
      - name: Prepare environment variables
        working-directory: dummy-e2e
        run: ./create-env-vars.sh
      - name: Run Playwright tests
        working-directory: dummy-e2e
        run: npm run e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Stop local replica
        run: dfx stop
